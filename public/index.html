<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tenis Miri — Catálogo</title>
  <meta name="robots" content="noindex, nofollow" />
  <meta name="description" content="Catálogo de sneakers Tenis Miri" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://res.cloudinary.com" />
  <link rel="stylesheet" href="/css/output.css" />
</head>
<body class="min-h-dvh bg-white dark:bg-[#0a0a0a] text-[#0a0a0a] dark:text-[#fafafa] font-sans antialiased">

  <!-- ── Header ──────────────────────────────────────────────────────────── -->
  <header class="sticky top-0 z-40 bg-white/95 dark:bg-[#0a0a0a]/95 backdrop-blur-sm border-b border-[#e5e5e5] dark:border-[#262626]">
    <div class="max-w-7xl mx-auto px-4 h-14 flex items-center justify-between">
      <a href="/" class="text-base font-bold tracking-widest uppercase select-none">
        Tenis Miri
      </a>
      <button id="btn-search" class="w-10 h-10 flex items-center justify-center" aria-label="Buscar">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
        </svg>
      </button>
    </div>
  </header>

  <!-- ── Main ────────────────────────────────────────────────────────────── -->
  <main class="max-w-7xl mx-auto px-4 pb-24">
    <p id="results-count" class="text-xs text-[#a3a3a3] dark:text-[#525252] py-3 h-8"></p>

    <!-- Grid -->
    <div id="grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-x-1 gap-y-6"></div>

    <!-- Empty state -->
    <div id="empty-state" class="hidden text-center py-24">
      <p class="text-[#525252] dark:text-[#a3a3a3] text-sm">Sin resultados para tu búsqueda.</p>
      <a href="/" class="mt-4 inline-block text-sm underline text-[#0a0a0a] dark:text-[#fafafa]">Ver todos</a>
    </div>
  </main>

  <!-- ── FAB Filtros ─────────────────────────────────────────────────────── -->
  <div class="fixed bottom-6 right-4 z-40">
    <button id="btn-open-filters" class="flex items-center gap-2 px-4 h-11 bg-[#0a0a0a] dark:bg-[#fafafa] text-white dark:text-[#0a0a0a] text-sm font-medium rounded-full shadow-lg active:scale-95 transition-transform duration-100">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 6h9.75M10.5 6a1.5 1.5 0 1 1-3 0m3 0a1.5 1.5 0 1 0-3 0M3.75 6H7.5m3 12h9.75m-9.75 0a1.5 1.5 0 0 1-3 0m3 0a1.5 1.5 0 0 0-3 0m-3.75 0H7.5m9-6h3.75m-3.75 0a1.5 1.5 0 0 1-3 0m3 0a1.5 1.5 0 0 0-3 0m-9.75 0h9.75" />
      </svg>
      Filtros
    </button>
  </div>

  <!-- ── Filter overlay ──────────────────────────────────────────────────── -->
  <div id="filter-overlay" class="fixed inset-0 z-50 bg-black/50 opacity-0 pointer-events-none transition-opacity duration-300" aria-hidden="true"></div>

  <!-- ── Filter bottom sheet ─────────────────────────────────────────────── -->
  <div
    id="filter-sheet"
    role="dialog"
    aria-modal="true"
    aria-label="Filtros"
    class="fixed bottom-0 left-0 right-0 z-50 bg-white dark:bg-[#171717] rounded-t-2xl shadow-2xl translate-y-full transition-transform duration-300 ease-out max-h-[88vh] overflow-y-auto"
  >
    <!-- Handle -->
    <div class="flex justify-center pt-3 pb-1">
      <div class="w-10 h-1 rounded-full bg-[#e5e5e5] dark:bg-[#262626]"></div>
    </div>

    <!-- Header -->
    <div class="flex items-center justify-between px-5 py-3 border-b border-[#e5e5e5] dark:border-[#262626]">
      <h2 class="font-semibold text-base">Filtros</h2>
      <button id="btn-close-filters" class="w-8 h-8 flex items-center justify-center text-[#525252] dark:text-[#a3a3a3]" aria-label="Cerrar filtros">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>

    <!-- Body -->
    <div class="px-5 pt-5 pb-4 space-y-7">

      <!-- Marca -->
      <div>
        <h3 class="text-xs font-semibold uppercase tracking-widest text-[#525252] dark:text-[#a3a3a3] mb-3">Marca</h3>
        <div id="filter-marcas" class="flex flex-wrap gap-2"></div>
      </div>

      <!-- Talla -->
      <div>
        <h3 class="text-xs font-semibold uppercase tracking-widest text-[#525252] dark:text-[#a3a3a3] mb-3">Talla</h3>
        <div id="filter-tallas" class="flex flex-wrap gap-2"></div>
      </div>

      <!-- Precio -->
      <div>
        <div class="flex items-center justify-between mb-3">
          <h3 class="text-xs font-semibold uppercase tracking-widest text-[#525252] dark:text-[#a3a3a3]">Precio</h3>
          <span class="text-xs text-[#525252] dark:text-[#a3a3a3] font-tabular">
            <span id="precio-min-label"></span> — <span id="precio-max-label"></span>
          </span>
        </div>
        <div class="space-y-2">
          <input id="precio-min" type="range" class="w-full h-1 accent-[#0a0a0a] dark:accent-[#fafafa]" />
          <input id="precio-max" type="range" class="w-full h-1 accent-[#0a0a0a] dark:accent-[#fafafa]" />
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="flex gap-3 px-5 pt-2 pb-10">
      <button id="btn-clear-filters" class="flex-1 h-12 border border-[#e5e5e5] dark:border-[#262626] rounded-xl text-sm font-medium text-[#0a0a0a] dark:text-[#fafafa] active:bg-[#f5f5f5] dark:active:bg-[#262626] transition-colors">
        Limpiar
      </button>
      <button id="btn-apply-filters" class="flex-1 h-12 bg-[#0a0a0a] dark:bg-[#fafafa] text-white dark:text-[#0a0a0a] rounded-xl text-sm font-semibold active:opacity-80 transition-opacity">
        Aplicar
      </button>
    </div>
  </div>

  <!-- ── Search overlay ──────────────────────────────────────────────────── -->
  <div id="search-overlay" class="hidden fixed inset-0 z-50 bg-white dark:bg-[#0a0a0a]" role="dialog" aria-modal="true" aria-label="Búsqueda">
    <div class="flex items-center gap-3 px-4 h-14 border-b border-[#e5e5e5] dark:border-[#262626]">
      <button id="btn-close-search" class="w-8 h-8 flex items-center justify-center text-[#0a0a0a] dark:text-[#fafafa]" aria-label="Cerrar búsqueda">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" />
        </svg>
      </button>
      <input
        id="search-input"
        type="search"
        inputmode="search"
        placeholder="Buscar por nombre, marca, talla..."
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
        class="flex-1 bg-transparent text-sm text-[#0a0a0a] dark:text-[#fafafa] placeholder-[#a3a3a3] dark:placeholder-[#525252] outline-none"
      />
      <button id="btn-clear-search" class="w-8 h-8 flex items-center justify-center text-[#a3a3a3]" aria-label="Limpiar búsqueda">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>
  </div>

  <script type="module" src="/js/main.js"></script>
</body>
</html>
